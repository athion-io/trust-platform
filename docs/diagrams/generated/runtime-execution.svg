.6289" x="10262.19" y="1140.6894"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="91.6289" x="10272.19" y="1156.6845">3. start tasks</text></g><!--entity stop1--><g class="entity" data-qualified-name="lifecyclePkg.shutdownFlow.stop1" data-source-line="190" id="ent0086"><rect fill="#FFFFFF" height="22.2969" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="109.2568" x="9951.37" y="142.0394"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="89.2568" x="9961.37" y="158.0345">1. stop tasks</text></g><!--entity stop2--><g class="entity" data-qualified-name="lifecyclePkg.shutdownFlow.stop2" data-source-line="191" id="ent0087"><rect fill="#FFFFFF" height="22.2969" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="129.7031" x="9772.15" y="142.0394"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="109.7031" x="9782.15" y="158.0345">2. save_retain()</text></g><g class="entity" data-qualified-name="hmiPkg.GMN147" data-source-line="267" id="ent0148"><path d="M1856.39,2141.4094 L1856.39,2257.3391 A0,0 0 0 0 1856.39,2257.3391 L2263.6195,2257.3391 A0,0 0 0 0 2263.6195,2257.3391 L2263.6195,2203.6394 L2317.35,2199.6394 L2263.6195,2195.6394 L2263.6195,2151.4094 L2253.6195,2141.4094 L1856.39,2141.4094 A0,0 0 0 0 1856.39,2141.4094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M2253.6195,2141.4094 L2253.6195,2151.4094 L2263.6195,2151.4094 L2253.6195,2141.4094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="122.3574" x="1862.39" y="2158.4763">security boundary:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="272.6128" x="1862.39" y="2173.6091">&#8226; web auth required for session bootstrap</text><text fill="#000000" font-family="Verdana" font-size="13" length